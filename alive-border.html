<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alive Stream Border</title>
  <style>
    :root {
      --border-size: clamp(22px, 1.75vw, 38px);
      --outer-color: #7f4dff;
      --mid-color: #9f7aff;
      --inner-glow: rgba(170, 145, 255, 0.75);
      --pulse: 1;
      --noise-shift: 0px;
      --flicker-alpha: 0.24;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    /* Wrapper is full transparent so gameplay/camera can show through. */
    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      isolation: isolate;
    }

    .ring {
      position: absolute;
      inset: 0;
      border: var(--border-size) solid var(--outer-color);
      border-radius: 10px;
      opacity: calc(0.9 * var(--pulse));
      filter: saturate(1.08) brightness(1.02);
      box-shadow:
        0 0 0 1px rgba(184, 164, 255, 0.45),
        0 0 24px 2px rgba(155, 115, 255, 0.35),
        inset 0 0 20px rgba(183, 149, 255, 0.28);
      animation: breathe 7s ease-in-out infinite;
    }

    .ring::before,
    .ring::after {
      content: "";
      position: absolute;
      inset: calc(-1 * var(--border-size));
      border-radius: 12px;
      pointer-events: none;
    }

    .ring::before {
      border: max(4px, calc(var(--border-size) * 0.3)) solid var(--mid-color);
      opacity: 0.5;
      mix-blend-mode: screen;
      animation: drift 5.5s linear infinite;
      transform: translateX(var(--noise-shift));
    }

    .ring::after {
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: inset 0 0 36px var(--inner-glow);
      opacity: 0.65;
      animation: twitch 3.7s steps(7, end) infinite;
    }

    .grain,
    .pixels,
    .inverts {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      overflow: hidden;
    }

    /* Restrict effects to border area by masking center out. */
    .grain,
    .pixels,
    .inverts,
    .scanline {
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      padding: calc(var(--border-size) - 2px);
    }

    .grain {
      opacity: var(--flicker-alpha);
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.16) 0px,
          rgba(255,255,255,0.16) 1px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(197,161,255,0.15) 0px,
          rgba(197,161,255,0.15) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 3px
        );
      animation: staticJitter 550ms steps(3, end) infinite;
      mix-blend-mode: screen;
    }

    .scanline {
      position: absolute;
      inset: 0;
      opacity: 0.3;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255, 255, 255, 0.18) 40%,
        rgba(220, 190, 255, 0.22) 50%,
        transparent 100%
      );
      animation: scan 8s linear infinite;
    }

    .pixel {
      position: absolute;
      width: 2px;
      height: 2px;
      opacity: 0.85;
      background: rgba(10, 10, 14, 0.9);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.45);
    }

    .pixel.dead {
      background: rgba(0, 0, 0, 0.95);
    }

    .pixel.hot {
      background: rgba(217, 191, 255, 0.95);
      box-shadow: 0 0 7px rgba(193, 156, 255, 0.55);
    }

    .invert {
      position: absolute;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.85);
      mix-blend-mode: difference;
      opacity: 0.7;
      animation: blink 1800ms steps(2, end) infinite;
    }

    @keyframes breathe {
      0%, 100% { filter: saturate(1.06) brightness(1); }
      50% { filter: saturate(1.18) brightness(1.08); }
    }

    @keyframes drift {
      0% { transform: translateX(-1px); }
      50% { transform: translateX(1.5px); }
      100% { transform: translateX(-1px); }
    }

    @keyframes staticJitter {
      0% { transform: translate(0, 0); }
      30% { transform: translate(0.5px, -0.6px); }
      60% { transform: translate(-0.8px, 0.3px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes twitch {
      0%, 100% { opacity: 0.7; }
      25% { opacity: 0.45; }
      26% { opacity: 0.78; }
      52% { opacity: 0.52; }
      53% { opacity: 0.74; }
    }

    @keyframes scan {
      from { transform: translateY(-100%); }
      to { transform: translateY(100%); }
    }

    @keyframes blink {
      0%, 15%, 100% { opacity: 0.72; }
      16%, 18% { opacity: 0.08; }
      19%, 22% { opacity: 0.68; }
      23%, 30% { opacity: 0.16; }
    }
  </style>
</head>
<body>
  <main class="frame" aria-hidden="true">
    <div class="ring"></div>
    <div class="grain"></div>
    <div class="scanline"></div>
    <div class="pixels" id="pixels"></div>
    <div class="inverts" id="inverts"></div>
  </main>

  <script>
    const root = document.documentElement;
    const pixelsLayer = document.getElementById('pixels');
    const invertLayer = document.getElementById('inverts');

    const rand = (min, max) => Math.random() * (max - min) + min;
    const pick = (items) => items[Math.floor(Math.random() * items.length)];

    function borderPosition(size = 2) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const t = parseFloat(getComputedStyle(root).getPropertyValue('--border-size'));
      const side = pick(['top', 'right', 'bottom', 'left']);
      const jitter = rand(-4, 4);

      if (side === 'top') return { x: rand(0, w - size), y: rand(0, t - size) + jitter };
      if (side === 'bottom') return { x: rand(0, w - size), y: h - t + rand(0, t - size) + jitter };
      if (side === 'left') return { x: rand(0, t - size) + jitter, y: rand(0, h - size) };
      return { x: w - t + rand(0, t - size) + jitter, y: rand(0, h - size) };
    }

    function spawnPixel() {
      const dot = document.createElement('span');
      dot.className = `pixel ${Math.random() < 0.22 ? 'hot' : Math.random() < 0.55 ? 'dead' : ''}`.trim();
      const size = Math.random() < 0.1 ? 3 : 2;
      const p = borderPosition(size);

      dot.style.width = `${size}px`;
      dot.style.height = `${size}px`;
      dot.style.left = `${p.x}px`;
      dot.style.top = `${p.y}px`;
      dot.style.opacity = String(rand(0.35, 0.95));
      pixelsLayer.appendChild(dot);

      const life = rand(250, 1500);
      setTimeout(() => dot.remove(), life);
    }

    function spawnInvert() {
      if (Math.random() > 0.58) return;
      const block = document.createElement('span');
      block.className = 'invert';
      const size = pick([3, 4, 5, 6]);
      const p = borderPosition(size);

      block.style.width = `${size}px`;
      block.style.height = `${size}px`;
      block.style.left = `${p.x}px`;
      block.style.top = `${p.y}px`;
      block.style.animationDuration = `${rand(1100, 2600)}ms`;
      invertLayer.appendChild(block);

      setTimeout(() => block.remove(), rand(450, 1800));
    }

    function moodShift() {
      root.style.setProperty('--pulse', rand(0.92, 1.08).toFixed(3));
      root.style.setProperty('--noise-shift', `${rand(-1.4, 1.4).toFixed(2)}px`);
      root.style.setProperty('--flicker-alpha', rand(0.15, 0.3).toFixed(3));
    }

    setInterval(() => {
      const burst = Math.floor(rand(2, 8));
      for (let i = 0; i < burst; i++) spawnPixel();
      spawnInvert();
      if (Math.random() < 0.3) moodShift();
    }, 120);

    setInterval(() => {
      if (pixelsLayer.childElementCount > 220) {
        [...pixelsLayer.children].slice(0, 45).forEach(el => el.remove());
      }
      if (invertLayer.childElementCount > 45) {
        [...invertLayer.children].slice(0, 10).forEach(el => el.remove());
      }
    }, 800);

    window.addEventListener('resize', moodShift);
    moodShift();
  </script>
</body>
</html>
