<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alive Stream Border</title>
  <style>
    :root {
      --border-size: clamp(24px, 2vw, 42px);
      --outer-color: #7f4dff;
      --mid-color: #a382ff;
      --inner-glow: rgba(170, 145, 255, 0.75);
      --pulse: 1;
      --noise-shift: 0px;
      --flicker-alpha: 0.24;
      --warp-x: 0px;
      --warp-y: 0px;
      --warp-rot: 0deg;
      --warp-skew: 0deg;
      --crt-vignette: 0.22;
      --rgb-shift: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      isolation: isolate;
      transform:
        translate(var(--warp-x), var(--warp-y))
        rotate(var(--warp-rot))
        skewX(var(--warp-skew));
      transform-origin: center;
      animation: baselineWarp 6.5s ease-in-out infinite;
    }

    .ring {
      position: absolute;
      inset: 0;
      border: var(--border-size) solid var(--outer-color);
      border-radius: 12px;
      opacity: calc(0.9 * var(--pulse));
      filter: saturate(1.08) brightness(1.02);
      box-shadow:
        0 0 0 1px rgba(184, 164, 255, 0.45),
        0 0 24px 2px rgba(155, 115, 255, 0.35),
        inset 0 0 20px rgba(183, 149, 255, 0.28);
      animation: breathe 7s ease-in-out infinite;
    }

    .ring::before,
    .ring::after {
      content: "";
      position: absolute;
      inset: calc(-1 * var(--border-size));
      border-radius: 14px;
      pointer-events: none;
    }

    .ring::before {
      border: max(4px, calc(var(--border-size) * 0.28)) solid var(--mid-color);
      opacity: 0.55;
      mix-blend-mode: screen;
      animation: drift 5.5s linear infinite;
      transform: translateX(var(--noise-shift));
    }

    .ring::after {
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: inset 0 0 36px var(--inner-glow);
      opacity: 0.65;
      animation: twitch 3.7s steps(7, end) infinite;
    }

    .grain,
    .pixels,
    .inverts,
    .blocks,
    .crt,
    .scanline {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .grain,
    .pixels,
    .inverts,
    .blocks,
    .crt,
    .scanline {
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      padding: calc(var(--border-size) - 2px);
    }

    .grain {
      opacity: var(--flicker-alpha);
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.16) 0px,
          rgba(255,255,255,0.16) 1px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(197,161,255,0.15) 0px,
          rgba(197,161,255,0.15) 1px,
          rgba(0,0,0,0) 1px,
          rgba(0,0,0,0) 3px
        );
      animation: staticJitter 540ms steps(3, end) infinite;
      mix-blend-mode: screen;
    }

    .scanline {
      opacity: 0.28;
      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(255, 255, 255, 0.16) 45%,
          rgba(220, 190, 255, 0.24) 50%,
          transparent 100%
        );
      animation: scan 7.8s linear infinite;
    }

    .crt {
      opacity: 0.42;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.05) 0,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.06) 2px,
          rgba(0,0,0,0.06) 3px
        ),
        radial-gradient(
          ellipse at center,
          rgba(255,255,255,0) 60%,
          rgba(0,0,0,var(--crt-vignette)) 100%
        );
      animation: crtRoll 260ms steps(2, end) infinite;
      mix-blend-mode: soft-light;
    }

    .rgb-ghost {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: var(--border-size) solid rgba(140, 102, 255, 0.24);
      filter: blur(1px);
      transform: translateX(var(--rgb-shift));
      mix-blend-mode: screen;
      opacity: 0.5;
    }

    .pixel,
    .invert,
    .chunk {
      position: absolute;
      image-rendering: pixelated;
    }

    .pixel {
      width: 2px;
      height: 2px;
      opacity: 0.85;
      background: rgba(10, 10, 14, 0.9);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.45);
    }

    .pixel.dead { background: rgba(0, 0, 0, 0.95); }

    .pixel.hot {
      background: rgba(217, 191, 255, 0.95);
      box-shadow: 0 0 7px rgba(193, 156, 255, 0.55);
    }

    .invert {
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.86);
      mix-blend-mode: difference;
      opacity: 0.7;
      animation: blink 1800ms steps(2, end) infinite;
    }

    .chunk {
      border-radius: 1px;
      opacity: 0.8;
      animation: blockDecay 1200ms linear forwards;
    }

    .chunk.dead {
      background: rgba(0, 0, 0, 0.96);
      box-shadow: inset 0 0 6px rgba(255, 255, 255, 0.08);
    }

    .chunk.invert {
      background: rgba(255, 255, 255, 0.9);
      mix-blend-mode: difference;
    }

    @keyframes breathe {
      0%, 100% { filter: saturate(1.06) brightness(1); }
      50% { filter: saturate(1.2) brightness(1.09); }
    }

    @keyframes baselineWarp {
      0%, 100% { transform: translate(0, 0) rotate(0deg) skewX(0deg); }
      40% { transform: translate(0.3px, -0.4px) rotate(-0.05deg) skewX(0.06deg); }
      55% { transform: translate(-0.35px, 0.2px) rotate(0.03deg) skewX(-0.08deg); }
    }

    @keyframes drift {
      0% { transform: translateX(-1px); }
      50% { transform: translateX(1.5px); }
      100% { transform: translateX(-1px); }
    }

    @keyframes staticJitter {
      0% { transform: translate(0, 0); }
      30% { transform: translate(0.6px, -0.6px); }
      60% { transform: translate(-0.9px, 0.35px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes twitch {
      0%, 100% { opacity: 0.7; }
      25% { opacity: 0.45; }
      26% { opacity: 0.78; }
      52% { opacity: 0.52; }
      53% { opacity: 0.74; }
    }

    @keyframes scan {
      from { transform: translateY(-100%); }
      to { transform: translateY(100%); }
    }

    @keyframes crtRoll {
      0% { transform: translateY(0); }
      50% { transform: translateY(0.5px); }
      100% { transform: translateY(0); }
    }

    @keyframes blink {
      0%, 15%, 100% { opacity: 0.72; }
      16%, 18% { opacity: 0.08; }
      19%, 22% { opacity: 0.68; }
      23%, 30% { opacity: 0.16; }
    }

    @keyframes blockDecay {
      0% { opacity: 0.86; filter: blur(0px); }
      100% { opacity: 0.05; filter: blur(0.4px); }
    }
  </style>
</head>
<body>
  <main class="frame" id="frame" aria-hidden="true">
    <div class="ring"></div>
    <div class="rgb-ghost"></div>
    <div class="grain"></div>
    <div class="crt"></div>
    <div class="scanline"></div>
    <div class="pixels" id="pixels"></div>
    <div class="inverts" id="inverts"></div>
    <div class="blocks" id="blocks"></div>
  </main>

  <script>
    const root = document.documentElement;
    const frame = document.getElementById('frame');
    const pixelsLayer = document.getElementById('pixels');
    const invertLayer = document.getElementById('inverts');
    const blocksLayer = document.getElementById('blocks');

    const rand = (min, max) => Math.random() * (max - min) + min;
    const pick = (items) => items[Math.floor(Math.random() * items.length)];

    function borderPosition(size = 2) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const t = parseFloat(getComputedStyle(root).getPropertyValue('--border-size'));
      const side = pick(['top', 'right', 'bottom', 'left']);
      const jitter = rand(-6, 6);

      if (side === 'top') return { x: rand(0, w - size), y: rand(0, t - size) + jitter };
      if (side === 'bottom') return { x: rand(0, w - size), y: h - t + rand(0, t - size) + jitter };
      if (side === 'left') return { x: rand(0, t - size) + jitter, y: rand(0, h - size) };
      return { x: w - t + rand(0, t - size) + jitter, y: rand(0, h - size) };
    }

    function spawnPixel() {
      const dot = document.createElement('span');
      dot.className = `pixel ${Math.random() < 0.22 ? 'hot' : Math.random() < 0.58 ? 'dead' : ''}`.trim();
      const size = Math.random() < 0.14 ? 3 : 2;
      const p = borderPosition(size);

      dot.style.width = `${size}px`;
      dot.style.height = `${size}px`;
      dot.style.left = `${p.x}px`;
      dot.style.top = `${p.y}px`;
      dot.style.opacity = String(rand(0.35, 0.95));
      pixelsLayer.appendChild(dot);

      setTimeout(() => dot.remove(), rand(220, 1300));
    }

    function spawnInvert() {
      if (Math.random() > 0.62) return;
      const block = document.createElement('span');
      block.className = 'invert';
      const size = pick([3, 4, 5, 6, 7, 8]);
      const p = borderPosition(size);

      block.style.width = `${size}px`;
      block.style.height = `${size}px`;
      block.style.left = `${p.x}px`;
      block.style.top = `${p.y}px`;
      block.style.animationDuration = `${rand(1000, 2300)}ms`;
      invertLayer.appendChild(block);

      setTimeout(() => block.remove(), rand(400, 1600));
    }

    function spawnChunk() {
      if (Math.random() > 0.48) return;
      const block = document.createElement('span');
      const kind = Math.random() < 0.5 ? 'dead' : 'invert';
      block.className = `chunk ${kind}`;

      const sizeW = pick([8, 10, 12, 14, 16, 20, 24, 30]);
      const sizeH = pick([6, 8, 10, 12, 14, 16, 18]);
      const p = borderPosition(Math.max(sizeW, sizeH));

      block.style.width = `${sizeW}px`;
      block.style.height = `${sizeH}px`;
      block.style.left = `${p.x}px`;
      block.style.top = `${p.y}px`;
      block.style.transform = `skew(${rand(-4, 4).toFixed(2)}deg, ${rand(-2, 2).toFixed(2)}deg)`;
      blocksLayer.appendChild(block);

      setTimeout(() => block.remove(), rand(500, 1800));
    }

    function moodShift() {
      root.style.setProperty('--pulse', rand(0.9, 1.11).toFixed(3));
      root.style.setProperty('--noise-shift', `${rand(-1.8, 1.8).toFixed(2)}px`);
      root.style.setProperty('--flicker-alpha', rand(0.15, 0.34).toFixed(3));
      root.style.setProperty('--crt-vignette', rand(0.18, 0.3).toFixed(3));
      root.style.setProperty('--rgb-shift', `${rand(-1.4, 1.4).toFixed(2)}px`);
    }

    function warpPulse() {
      if (Math.random() > 0.2) return;
      root.style.setProperty('--warp-x', `${rand(-2, 2).toFixed(2)}px`);
      root.style.setProperty('--warp-y', `${rand(-1.5, 1.5).toFixed(2)}px`);
      root.style.setProperty('--warp-rot', `${rand(-0.35, 0.35).toFixed(3)}deg`);
      root.style.setProperty('--warp-skew', `${rand(-0.7, 0.7).toFixed(3)}deg`);

      frame.style.filter = `contrast(${rand(1.02, 1.08).toFixed(3)}) brightness(${rand(0.96, 1.05).toFixed(3)})`;
      setTimeout(() => {
        root.style.setProperty('--warp-x', '0px');
        root.style.setProperty('--warp-y', '0px');
        root.style.setProperty('--warp-rot', '0deg');
        root.style.setProperty('--warp-skew', '0deg');
        frame.style.filter = '';
      }, rand(120, 420));
    }

    setInterval(() => {
      const burst = Math.floor(rand(3, 11));
      for (let i = 0; i < burst; i++) spawnPixel();

      const chunkBursts = Math.floor(rand(0, 4));
      for (let i = 0; i < chunkBursts; i++) spawnChunk();

      spawnInvert();
      warpPulse();

      if (Math.random() < 0.36) moodShift();
    }, 110);

    setInterval(() => {
      if (pixelsLayer.childElementCount > 280) {
        [...pixelsLayer.children].slice(0, 70).forEach(el => el.remove());
      }
      if (invertLayer.childElementCount > 60) {
        [...invertLayer.children].slice(0, 14).forEach(el => el.remove());
      }
      if (blocksLayer.childElementCount > 90) {
        [...blocksLayer.children].slice(0, 20).forEach(el => el.remove());
      }
    }, 700);

    window.addEventListener('resize', moodShift);
    moodShift();
  </script>
</body>
</html>
